# Preset Design System Check with Health Scoring + SARIF
# Full validation with health score tracking, regression detection,
# and SARIF output for GitHub Code Scanning.

name: Design System Check
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  preset-check:
    name: Preset Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Preset Check
        id: preset
        uses: preset-ai/compliance-check@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          supabase-url: ${{ secrets.PRESET_SUPABASE_URL }}
          supabase-key: ${{ secrets.PRESET_SUPABASE_KEY }}
          design-system-id: ${{ secrets.PRESET_DESIGN_SYSTEM_ID }}
          score-threshold: '70'
          regression-threshold: '5'
          upload-sarif: 'true'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .preset-results/results.sarif
          category: preset
