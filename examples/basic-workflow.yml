# Basic Preset Design System Check
# Runs on every PR, validates changed files against default patterns.
# No credentials needed — catches AI slop, hardcoded colors, native HTML elements.

name: Design System Check
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preset-check:
    name: Preset Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: preset-ai/compliance-check@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
